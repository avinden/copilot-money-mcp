name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: AI Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR for the copilot-money-mcp project (MCP server for personal finance data).

            Focus areas:
            1. Code Quality - Clean code, error handling, readability
            2. Security - Vulnerabilities, input validation, data privacy
            3. Performance - Bottlenecks, memory leaks, efficient data access
            4. Testing - Coverage, edge cases, test quality
            5. TypeScript - Proper typing, no any abuse, type safety
            6. MCP Protocol - Correct tool definitions, proper server implementation
            7. Data Privacy - No logging of sensitive financial data

            Post inline comments on specific changed lines for each issue found.
            Be constructive. Praise good patterns too.
            Post a summary comment with your overall assessment when done.
          claude_args: '--model claude-sonnet-4-6 --max-turns 25'
